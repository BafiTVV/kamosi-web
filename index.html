<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamoši | OneBlock Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-bg: #111114;
            --accent: #22c55e;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }

        .header-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .server-info h1 { margin: 0; font-size: 28px; letter-spacing: -1px; }
        .status-badge {
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-box span { display: block; color: var(--text-muted); font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box b { font-size: 24px; color: var(--accent); }

        .leaderboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card h3 { margin-top: 0; font-size: 16px; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--text-muted); font-size: 12px; padding: 10px; }
        td { padding: 10px; border-top: 1px solid var(--border); font-size: 14px; }
        
        .no-data { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; }

        @media (max-width: 768px) { .leaderboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <div class="server-info">
            <span id="dot-status" class="status-badge">Zjišťuji...</span>
            <h1>Kamoši OneBlock</h1>
            <code style="color: var(--text-muted); cursor: pointer;" onclick="copyIP()">comes-advances.gl.joinmc.link</code>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 32px; font-weight: 700;" id="player-count">0/0</div>
            <div style="font-size: 12px; color: var(--text-muted);">HRÁČI ONLINE</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span>Celkem vytěženo</span><b>14.2k</b></div>
        <div class="stat-box"><span>Celkem úmrtí</span><b>84</b></div>
        <div class="stat-box"><span>Aktivní klan</span><b>Kamoši</b></div>
    </div>

    <div class="leaderboard-grid">
        <div class="card">
            <h3>🏆 TOP 10 TĚŽAŘI</h3>
            <div class="no-data">Data se synchronizují...</div>
        </div>
        <div class="card">
            <h3>💀 NEJVÍCE ÚMRTÍ</h3>
            <table>
                <tr><th>#</th><th>HRÁČ</th><th>SMRTI</th></tr>
                <tr><td>1.</td><td>Filip</td><td>12</td></tr>
                <tr><td>2.</td><td>Kamoš1</td><td>8</td></tr>
            </table>
        </div>
    </div>
</div>

<script>
    function copyIP() {
        navigator.clipboard.writeText('comes-advances.gl.joinmc.link');
        alert('IP zkopírována!');
    }

    async function updateStatus() {
        try {
            const res = await fetch('https://api.mcsrvstat.us/2/comes-advances.gl.joinmc.link');
            const data = await res.json();
            const badge = document.getElementById('dot-status');
            const pc = document.getElementById('player-count');

            if (data.online) {
                badge.innerHTML = "● ONLINE";
                badge.style.color = "#22c55e";
                pc.innerHTML = `${data.players.online}/${data.players.max}`;
            } else {
                badge.innerHTML = "● OFFLINE";
                badge.style.color = "#ef4444";
                pc.innerHTML = "0/0";
            }
        } catch (e) { console.log("Chyba API"); }
    }
    updateStatus();
    setInterval(updateStatus, 30000);
</script>

</body>
</html>
